# Required for @cloudflare/next-on-pages (Node built-ins).
# Git-based deploys: Cloudflare does NOT read build command from this file.
# You MUST set in Dashboard → Settings → Builds & deployments:
#   Build command: npm ci --legacy-peer-deps && npm run build:cloudflare
#   Build output directory: .vercel/output/static
# Also set nodejs_compat in Settings → Functions → Compatibility flags.
name = "leasingapp"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"
